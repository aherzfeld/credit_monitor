# Copy this file to config.yaml and fill in your values.

# Get a free FRED API key here: https://fred.stlouisfed.org/docs/api/api_key.html
fred_api_key: "YOUR_FRED_API_KEY_HERE"

email:
  enabled: true            # set false to disable email alerts entirely
  alert_threshold: 50      # composite score above which alerts fire (50 = Tightening)

  # SMTP settings. Gmail example below — you'll need an "App Password",
  # NOT your regular Gmail password. Create one at:
  #   https://myaccount.google.com/apppasswords
  # (Requires 2-factor auth on your Google account.)
  #
  # Other common SMTP servers:
  #   Outlook/Hotmail: smtp-mail.outlook.com, port 587 (use SMTP_SSL with port 465 not supported; needs STARTTLS)
  #   ProtonMail:      requires Bridge app
  #   Fastmail:        smtp.fastmail.com, port 465
  #
  # For Gmail (recommended):
  smtp_host: "smtp.gmail.com"
  smtp_port: 465
  smtp_user: "you@gmail.com"
  smtp_password: "your-16-char-app-password"
  from_addr: "you@gmail.com"
  to_addr: "you@gmail.com"     # can be same as from_addr, or any other address
